<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Creative Suite</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0908;--sf:#111009;
  --bd:rgba(200,169,110,0.12);--bd2:rgba(200,169,110,0.25);
  --ac:#c8a96e;--ac2:#e2c98a;
  --tx:#f0ede8;--mu:rgba(240,237,232,0.45);--dm:rgba(240,237,232,0.2);
  --nav-h:52px;--bot-h:0px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;overflow:hidden}

/* ── Top Nav (desktop) ── */
nav{
  height:var(--nav-h);background:var(--sf);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;gap:4px;
  position:relative;z-index:100;flex-shrink:0;
}
.nav-brand{
  font-family:'DM Serif Display',serif;font-size:17px;color:var(--ac);
  letter-spacing:.04em;margin-right:16px;white-space:nowrap;flex-shrink:0;
}
.nav-brand span{
  font-family:'DM Mono',monospace;font-size:9px;font-weight:300;
  color:var(--dm);letter-spacing:.18em;vertical-align:middle;
  margin-left:6px;text-transform:uppercase;
}
.nav-sep{width:1px;height:22px;background:var(--bd);margin:0 8px;flex-shrink:0}
.nav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{
  display:flex;align-items:center;gap:8px;padding:7px 16px;
  border-radius:6px;border:1px solid transparent;background:transparent;
  color:var(--mu);font-family:'DM Mono',monospace;font-size:10.5px;
  font-weight:400;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all .16s;white-space:nowrap;
}
.nav-tab:hover{color:var(--tx);background:rgba(200,169,110,0.06);border-color:var(--bd)}
.nav-tab.active{color:var(--ac);background:rgba(200,169,110,0.1);border-color:var(--bd2)}
.nav-tab .icon{font-size:14px;opacity:.8}
.nav-tab.active .icon{opacity:1}
.nav-dot{
  width:5px;height:5px;border-radius:50%;background:var(--ac);
  margin-left:auto;opacity:0;transition:opacity .3s;flex-shrink:0;
}
.nav-dot.pulse{opacity:1;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* ── Bottom Tab Bar (mobile only) ── */
.bot-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:calc(60px + env(safe-area-inset-bottom));
  background:var(--sf);
  border-top:1px solid var(--bd);
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.bot-tabs{
  display:flex;height:60px;
}
.bot-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;background:transparent;border:none;
  color:var(--mu);cursor:pointer;transition:color .15s;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;
  text-transform:uppercase;padding:0;
}
.bot-tab .bt-icon{font-size:20px;line-height:1}
.bot-tab.active{color:var(--ac)}
.bot-tab.active .bt-icon{filter:drop-shadow(0 0 6px rgba(200,169,110,0.5))}

/* ── App container ── */
#app-container{
  width:100%;height:calc(100vh - var(--nav-h));
  position:relative;background:var(--bg);
}
.pane{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;display:none;opacity:0;transition:opacity .22s ease;
}
.pane.visible{display:block}
.pane.faded-in{opacity:1}

/* ── Splash ── */
#splash{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:32px;
  background:var(--bg);transition:opacity .3s;
}
#splash.hidden{opacity:0;pointer-events:none}
.splash-title{
  font-family:'DM Serif Display',serif;font-size:42px;color:var(--ac);
  letter-spacing:.03em;text-align:center;line-height:1.1;
}
.splash-title em{font-style:italic;color:var(--ac2)}
.splash-sub{font-size:11px;color:var(--dm);letter-spacing:.18em;text-transform:uppercase;text-align:center}
.splash-cards{
  display:flex;gap:12px;flex-wrap:wrap;
  justify-content:center;max-width:700px;padding:0 20px;
}
.splash-card{
  display:flex;flex-direction:column;align-items:flex-start;gap:6px;
  padding:16px 20px;border:1px solid var(--bd);border-radius:10px;
  background:rgba(200,169,110,0.04);cursor:pointer;transition:all .18s;
  min-width:148px;flex:1;max-width:180px;
}
.splash-card:hover{border-color:var(--bd2);background:rgba(200,169,110,0.09);transform:translateY(-2px)}
.splash-card .sc-icon{font-size:22px}
.splash-card .sc-name{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;color:var(--tx);
}
.splash-card .sc-desc{font-size:10px;color:var(--mu);line-height:1.45;letter-spacing:.02em}

/* ── Mobile overrides ── */
@media(max-width:768px){
  :root{--nav-h:48px;--bot-h:calc(60px + env(safe-area-inset-bottom))}
  nav{padding:0 14px;gap:3px}
  .nav-brand{font-size:15px;margin-right:0}
  .nav-brand span,.nav-sep,.nav-tabs,.nav-dot{display:none}
  .bot-nav{display:block}
  #app-container{
    height:calc(100dvh - var(--nav-h) - var(--bot-h));
    margin-bottom:var(--bot-h);
  }
  .splash-title{font-size:28px}
  .splash-cards{gap:8px;padding:0 14px}
  .splash-card{min-width:calc(50% - 4px);max-width:calc(50% - 4px);flex:none;padding:12px 14px}
  .splash-card .sc-desc{display:none}
}
</style>
</head>

};

const loaded = {};
let current = null;

function openApp(id) {
  const dot = document.getElementById('nav-dot');
  document.getElementById('splash').classList.add('hidden');

  // Update both nav sets
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.bot-tab').forEach(t => t.classList.remove('active'));
  const topTab = document.getElementById('tab-' + id);
  const botTab = document.getElementById('btab-' + id);
  if (topTab) topTab.classList.add('active');
  if (botTab) botTab.classList.add('active');

  if (current && current !== id) {
    const prev = document.getElementById('pane-' + current);
    prev.classList.remove('faded-in');
    setTimeout(() => prev.classList.remove('visible'), 220);
  }

  current = id;
  const pane = document.getElementById('pane-' + id);

  if (!loaded[id]) {
    dot.classList.add('pulse');
    const binary = atob(APPS[id]);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], {type: 'text/html'});
    pane.src = URL.createObjectURL(blob);
    pane.onload = () => {
      loaded[id] = true;
      dot.classList.remove('pulse');
      pane.classList.add('visible');
      requestAnimationFrame(() => requestAnimationFrame(() => pane.classList.add('faded-in')));
    };
    loaded[id] = 'loading';
  } else if (loaded[id] === true) {
    pane.classList.add('visible');
    requestAnimationFrame(() => requestAnimationFrame(() => pane.classList.add('faded-in')));
  }
}
</script>
